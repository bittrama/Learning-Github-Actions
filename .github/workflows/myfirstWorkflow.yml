name: my-First-Workflow
on:
    schedule:
      - cron: "*/1 * * * *"

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Running Single Command in Job1
        run: echo "Hi this is my first workflow"
      - name: Checking OS Release
        run: cat /etc/os-release
      - name: Calling sleep
        run: sleep 20
  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
      - name: Checking the Hostname
        run: hostname
      - name: Running Multiple Commands
        run:
          echo "Hi from Costa Rica"
          echo "Current time is `date`"
  job3:
    name: JOB3
    needs: job1
    runs-on: windows-latest
    steps:
      - name: Job with Single Dependency
        run: sleep 10
      - name: Checking Runnver Info
        shell: pwsh
        run: get-computerinfo
  job4:
    name: JOB4
    needs: [job1, job2, job3]
    runs-on: macos-latest
    steps: 
      - name: Job for multiple dependencies
        run: sleep 10
      - name: CHecking Runner Info
        run: sw_vers
