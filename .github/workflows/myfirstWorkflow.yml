name: my-First-Workflow
on:
    push:

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
        - name: Step-1
          run: |
             pwd
             ls -ltr
             hostname
        - name: Step-2 Checkout
          uses: actions/checkout@v7.0.0
        - name: Step-3
          run: |
                echo `pwd` >> myartifact.txt
                ls -ltr
                hostname
        - name: Upload Single File
          uses: actions/upload-artifact@v5.0.0
          with:
              name: single_file
              path: ./myartifact.txt
