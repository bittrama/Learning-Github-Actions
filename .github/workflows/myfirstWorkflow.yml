name: my-First-Workflow
on:
    push:
        branches:
          - dev
          - 'feature-*'

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
        - name: Step-1
          run: |
             pwd
             ls -ltr
             hostname
        - name: Step-2 Checkout
          uses: actions/checkout@v7.0.0
        - name: Step-3
          run: |
                echo `pwd` >> myartifact.txt
                mkdir artifacts
                echo `ls -ltr` >> artifacts/list.txt
                echo `hostname` >> artifacts/hostname.txt
        - name: Upload Single File
          uses: actions/upload-artifact@v7.0.1
          with:
              name: single_file
              path: ./myartifact.txt
  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
        - name: checking current directory
          run: |
                pwd
                ls -ltr
        - name: Download single file
          uses: actions/download-artifact@v8.0.1
          with:
              name: single_file
        - name: checking current directory post download
          run: |
              pwd
              ls -ltr
